name: Metrics
on:
  # Schedule daily updates at midnight
  schedule: [{cron: "0 0 * * *"}]
  # Allow you to run it manually from the Actions tab
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # Base stats
          base: header, activity, community, repositories
          # Habits plugin (averages and time of day)
          plugin_habits: no
          plugin_habits_from: 200       # Analyze last 200 events
          plugin_habits_days: 14        # Calculate averages over the last 14 days
          plugin_habits_charts: yes     # Display the charts
          plugin_habits_trim: yes
